<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Client -->
  <circle cx="70" cy="160" r="45" fill="#eef3fb" stroke="#3a6ea5" stroke-width="2"/>
  <text x="70" y="155" font-family="Helvetica, Arial, sans-serif" font-size="13" text-anchor="middle" fill="#1a1a1a">Server 4</text>
  <text x="70" y="172" font-family="Helvetica, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#444">(Client)</text>

  <!-- Arrow client -> LB -->
  <line x1="118" y1="160" x2="218" y2="160" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Load Balancer -->
  <rect x="225" y="115" width="160" height="90" rx="8" fill="#fff4e0" stroke="#c98a1c" stroke-width="2"/>
  <text x="305" y="150" font-family="Helvetica, Arial, sans-serif" font-size="13" text-anchor="middle" fill="#1a1a1a">Server 1</text>
  <text x="305" y="168" font-family="Helvetica, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#444">Nginx</text>
  <text x="305" y="184" font-family="Helvetica, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#777">Load Balancer</text>

  <!-- Arrow LB -> Server2 -->
  <line x1="390" y1="135" x2="500" y2="80" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow LB -> Server3 -->
  <line x1="390" y1="185" x2="500" y2="240" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Server 2 -->
  <rect x="505" y="40" width="160" height="85" rx="8" fill="#e9f6ec" stroke="#3f8a4f" stroke-width="2"/>
  <text x="585" y="73" font-family="Helvetica, Arial, sans-serif" font-size="13" text-anchor="middle" fill="#1a1a1a">Server 2</text>
  <text x="585" y="91" font-family="Helvetica, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#444">Nginx</text>
  <text x="585" y="107" font-family="Helvetica, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#777">Backend Web Server</text>

  <!-- Server 3 -->
  <rect x="505" y="195" width="160" height="85" rx="8" fill="#e9f6ec" stroke="#3f8a4f" stroke-width="2"/>
  <text x="585" y="228" font-family="Helvetica, Arial, sans-serif" font-size="13" text-anchor="middle" fill="#1a1a1a">Server 3</text>
  <text x="585" y="246" font-family="Helvetica, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#444">Apache</text>
  <text x="585" y="262" font-family="Helvetica, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#777">Backend Web Server</text>

  <!-- Caption -->
  <text x="360" y="305" font-family="Helvetica, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#888">Round-robin distribution · iptables filtering on Server 1 · rate limiting on Server 1</text>
</svg>
