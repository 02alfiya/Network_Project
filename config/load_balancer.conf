# Server 1: Nginx Load Balancer Configuraton
# Path on server: /etc/nginx/nginx.conf

upstream backend {
    server 192.168.1.2; # Server 2-Nginx Web Server
    server 192.168.1.3; # Server 3-Apache Web Server
    # Default method: round-robin (alternates requests evenly between servers above)
}

server {
    listen 80;

    location / {
        proxy_pass http://backend;
    }
}